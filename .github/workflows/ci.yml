name: CI

# Piramide dei test per DB Cookie Manager:
#   lint  → sintassi + standard WordPress (secondi)
#   unit  → logica pura di DBCM_Signatures, matrice PHP (~1 min)
#   e2e   → wp-env + Playwright, scenari §9 nel browser (~5-8 min)
#   build → ZIP di release compatibile con DB_GitHub_Updater (solo su tag)
#
# lint e unit girano su ogni push/PR. e2e gira dopo che passano (fail-fast:
# inutile avviare Docker se la sintassi è rotta). build solo sui tag v*.

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

# Annulla run precedenti sullo stesso ref (risparmia minuti Actions).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # LINT — php -l ricorsivo + PHP_CodeSniffer (standard WordPress)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (PHP + WPCS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer, cs2pr

      - name: php -l su tutti i file
        run: |
          # Fallisce se un qualsiasi file .php ha un errore di sintassi.
          find . -name '*.php' -not -path './vendor/*' -not -path './node_modules/*' \
            -print0 | xargs -0 -n1 -P4 php -l

      - name: Install Composer (dev)
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHPCBF (auto-fix stile correggibile)
        # Normalizza in automatico ciò che è sistemabile (spaziatura, virgolette,
        # allineamenti) sulla copia di lavoro del runner. Non committa nulla.
        # phpcbf esce 1 quando corregge: non è un errore.
        run: vendor/bin/phpcbf || true

      - name: PHPCS (report completo, non bloccante)
        # Mostra tutto inline nella PR (errori + warning), per chi vuole rifinire.
        run: vendor/bin/phpcs -q --report=checkstyle | cs2pr || true

      - name: "PHPCS (gate: errori sostanziali)"
        # Le regole estetiche (commenti, allineamenti, naming file) sono escluse
        # per nome nel ruleset. Restano bloccanti solo gli errori veri:
        # escaping, nonce, SQL, prefissi, funzioni vietate. -n ignora i warning
        # (doc-block mancanti inclusi).
        run: vendor/bin/phpcs -n

  # ---------------------------------------------------------------------------
  # UNIT — PHPUnit sulla logica pura (nessun WordPress, nessun DB)
  # ---------------------------------------------------------------------------
  unit:
    name: Unit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '7.4', '8.0', '8.1', '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      - name: Install Composer (dev)
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHPUnit (unit)
        run: vendor/bin/phpunit --testsuite unit --colors=always

  # ---------------------------------------------------------------------------
  # INTEGRATION — PHPUnit + WordPress test suite + MySQL reale
  # Copre l'I/O su database di Scanner e Consent-Log (tabelle, vincoli, query).
  # ---------------------------------------------------------------------------
  integration:
    name: Integration (WP + MySQL)
    runs-on: ubuntu-latest
    needs: [ lint ]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          extensions: mysqli
          coverage: none

      - name: Install Composer (dev)
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Installa WordPress test suite
        # Subversion serve per scaricare la test suite da develop.svn.wordpress.org.
        run: |
          sudo apt-get update && sudo apt-get install -y subversion
          bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 latest

      - name: PHPUnit (integration)
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
        run: vendor/bin/phpunit -c phpunit-integration.xml.dist --colors=always

  # ---------------------------------------------------------------------------
  # E2E — wp-env (WordPress + WooCommerce in Docker) + Playwright
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (wp-env + Playwright)
    runs-on: ubuntu-latest
    needs: [ lint, unit ]   # non avviare Docker se lint/unit falliscono
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dipendenze npm
        # npm install (non 'ci'): il repo non versiona package-lock.json, quindi
        # il lock viene risolto qui. Se in futuro committi il lockfile, si può
        # tornare a 'npm ci' + cache per build più rapide e riproducibili.
        run: npm install --no-audit --no-fund

      - name: Install browser Playwright
        run: npx playwright install --with-deps chromium

      - name: Avvia wp-env
        # wp-env legge .wp-env.json: monta il plugin, WooCommerce e il
        # mu-plugin di fixture. Docker è preinstallato sui runner ubuntu.
        # --debug espone i log di avvio se qualcosa va storto.
        run: npx wp-env start --debug

      - name: Diagnostica wp-env
        # Conferma che WordPress risponda prima di procedere. Se l'avvio è
        # fallito silenziosamente, qui lo vediamo subito con un messaggio chiaro.
        run: |
          npx wp-env run cli wp core version || {
            echo "::error::wp-env non risponde. Log dei container:"
            npx wp-env logs --watch=false || true
            exit 1
          }

      - name: Configura ambiente di test (WooCommerce + pagine fixture)
        run: npm run env:setup

      - name: Playwright E2E
        run: npx playwright test

      - name: Log wp-env in caso di fallimento
        if: ${{ failure() }}
        run: npx wp-env logs --watch=false || true

      - name: Carica report Playwright (se fallisce)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # BUILD — ZIP di release compatibile con DB_GitHub_Updater (solo su tag v*)
  # ---------------------------------------------------------------------------
  build:
    name: Build release ZIP
    runs-on: ubuntu-latest
    needs: [ lint, unit, e2e ]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # per allegare l'asset alla release
    steps:
      - uses: actions/checkout@v5

      - name: Costruisci lo ZIP del plugin
        run: bash bin/build-zip.sh

      - name: Allega lo ZIP alla GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/db-cookie-manager.zip
